name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # The unit tests exercise the pure/near-pure core (config, Ollama and
        # Neo4j helpers) and only need these lightweight packages — not the full
        # ML stack (torch, faiss, whisper, spaCy) required to run the app.
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv

      - name: Run tests
        run: python -m pytest
